<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Menü</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
        }
        .menu-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3 sütunlu grid */
            gap: 20px; /* Öğeler arası boşluk */
            justify-items: center; /* Öğeleri ortalar */
            max-width: 800px;
            margin: auto;
        }
        .menu-item {
            text-decoration: none;
            color: black;
        }
        .menu-item img {
            width: 200px;
            height: 150px;
            object-fit: cover;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <h2>Ana Yemekler</h2>

    <div class="menu-container">
        <a class="menu-item">
            <img src="../resimler/fırındatavuk.jpg" title="Fırında Tavuk">
            <h4>Fırında Tavuk</h4>
        </a>
        
        <a class="menu-item">
            <img src="../resimler/bulgurpilavı.jpg" title="Bulgur Pilavı">
            <h4>Bulgur Pilavı</h4>
        </a>

        <a class="menu-item">
            <img src="../resimler/pirinçpilavı.jpg" title="Pirinç Pilavı">
            <h4>Pirinç Pilavı</h4>
        </a>

        <a class="menu-item">
            <img src="../resimler/patlıcanmusakka.jpg" title="Patlıcan Musakka">
            <h4>Patlıcan Musakka</h4>
        </a>

        <a class="menu-item">
            <img src="../resimler/kadınbuduköfte.jpg" title="Kadınbudu Köfte">
            <h4>Kadınbudu Köfte</h4>
        </a>

        <a class="menu-item">
            <img src="../resimler/bulgurpilavı.jpg" title="Bulgur Pilavı">
            <h4>Bulgur Pilavı</h4>
        </a>
    </div>
</body>
</html>
