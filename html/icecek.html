    <style>
        body {

        }
        .menu-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3 sütunlu grid */

            justify-items: center; /* Öğeleri ortalar */
            max-width: 800px;
            margin: auto;
        }
        .menu-item {
            text-decoration: none;
            color: black;
        }
        .menu-item img {
            width: 180px;
            height: 130px;
            object-fit: cover;
            border-radius: 10px;
        }
    </style>
</head>
